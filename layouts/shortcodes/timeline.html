<div>
  <div class="timeline-body">
    {{ range .Site.Data.about.timeline }}
      <div class="timeline-item">
        <div class="content">
          <h2>{{ .title }}</h2>
          <div class="date">{{ .from }} — {{ .to }}</div>
          <div class="description">{{ .description | safeHTML }}</div>
        </div>
      </div>
    {{ end }}
  </div>
</div>
